services:
  - type: worker
    name: terabox-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: USER_SESSION
        sync: false
      - key: PRIVATE_CHANNEL_ID
        sync: false
      - key: OWNER_ID
        sync: false
